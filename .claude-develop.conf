# .claude-develop.conf — develop skill 設定ファイル

# ---- プロジェクト基本情報 ----
PROJECT_NAME="test"
PROJECT_DESCRIPTION_FILE="docs/PROJECT.md"

# ---- VCS モード ----
VCS_MODE="git_gh"

# ---- ディレクトリ設定 ----
PLAN_DIR="plans"
DESIGN_DIR="designs"
TEST_SPEC_DIR="test-specs"
IMPL_DIR="src"
LOCK_DIR="plans"

# ---- フェーズ定義 ----
PHASES="DESIGN SPEC_SYNC TEST_SPEC IMPL BUILD"

AGENT_DESIGN="develop-design"
AGENT_SPEC_SYNC="develop-spec-sync"
AGENT_TEST_SPEC="develop-test-spec"
AGENT_IMPL="develop-impl"
AGENT_BUILD="develop-build"

# ---- コマンド設定（デバッグ用ダミー: BUILD フェーズ時点で生成済みのファイル存在確認） ----
CHECK_CMD="ls designs/*.md"
TEST_CMD="ls test-specs/*-test-spec.md"
BUILD_CMD="ls src/*"

DEV_SERVER_SKILL="debug-dummy-server"

# ---- git_gh モード専用 ----
GH_REPO="tatsu-nstet/test"
BASE_BRANCH="main"
BRANCH_PREFIX="feature/"

GH_PROJECT_NUMBER="4"
GH_PROJECT_OWNER="tatsu-nstet"
